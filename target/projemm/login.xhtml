<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="jakarta.faces.passthrough">
<h:head>
    <title>Yönetici Girişi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #121413;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(18, 20, 19, 0.8), rgba(18, 20, 19, 0.95)), url('img/dark_beans.png') no-repeat center center fixed;
            background-size: cover;
        }
        .login-card {
            background-color: rgba(26, 31, 28, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(166, 124, 82, 0.3);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #A67C52, #2E8B57);
        }
        .form-control {
            background-color: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px;
        }
        .form-control:focus {
            background-color: rgba(0,0,0,0.5);
            border-color: #A67C52;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(166, 124, 82, 0.25);
        }
        .btn-accent {
            background: linear-gradient(135deg, #A67C52 0%, #8D6E63 100%);
            color: #ffffff;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-accent:hover {
            background: linear-gradient(135deg, #8D6E63 0%, #A67C52 100%);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(166, 124, 82, 0.4);
        }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .messages li.error { background-color: rgba(220, 53, 69, 0.2); color: #ff6b6b; border: 1px solid #dc3545; }
    </style>
</h:head>
<h:body>
    <div class="login-card">
        <h3 class="text-center mb-4" style="color: #EAE0D5; font-weight: 700; letter-spacing: 1px;"><i class="bi bi-shield-lock-fill me-2" style="color: #A67C52;"></i>Yönetici Girişi</h3>
        
        <h:messages globalOnly="true" styleClass="messages" errorClass="error" />

        <h:form id="loginForm">
            <div class="mb-3">
                <h:outputLabel value="Kullanıcı Adı" styleClass="form-label"/>
                <h:inputText value="#{loginBean.username}" styleClass="form-control" required="true" requiredMessage="Kullanıcı adı gerekli" />
            </div>
            <div class="mb-4">
                <h:outputLabel value="Şifre" styleClass="form-label"/>
                <h:inputSecret value="#{loginBean.password}" styleClass="form-control" required="true" requiredMessage="Şifre gerekli" />
            </div>
            <h:commandButton value="Giriş Yap" action="#{loginBean.login}" styleClass="btn btn-accent w-100 py-2 mb-3" />
            <div class="text-center mt-2">
                <a href="index.xhtml" style="color: #D4C9B8; text-decoration: none; font-size: 0.95rem; transition: color 0.3s;">
                    &#8592; Ana Menüye Dön
                </a>
            </div>
        </h:form>
    </div>
</h:body>
</html>
