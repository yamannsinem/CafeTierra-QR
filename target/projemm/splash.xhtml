<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>tierra | Yükleniyor...</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Redirect to welcome.xhtml after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=welcome.xhtml" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Outfit:wght@300;400;600;700&amp;display=swap" rel="stylesheet" />
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(44, 30, 22, 0.7), rgba(18, 20, 19, 0.9)), url('img/cafe_atmosphere.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: #EAE0D5;
        }
        
        .splash-container {
            text-align: center;
            animation: fadeIn 1s ease-out forwards;
        }
        
        .logo-icon {
            font-size: 6rem;
            color: #A67C52;
            margin-bottom: 1rem;
            animation: bounce 2s infinite ease-in-out, glow 2s infinite alternate;
            display: inline-block;
        }
        
        .brand-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #EAE0D5, #A67C52);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: slideUp 1s ease-out 0.5s forwards;
        }
        
        .slogan {
            font-size: 1.2rem;
            font-weight: 300;
            color: #D7CCC8;
            opacity: 0;
            animation: slideUp 1s ease-out 0.8s forwards;
        }
        
        .loader {
            margin-top: 3rem;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(166, 124, 82, 0.3);
            border-radius: 50%;
            border-top-color: #A67C52;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards, spin 1s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(166, 124, 82, 0.2); }
            to { text-shadow: 0 0 20px rgba(166, 124, 82, 0.8), 0 0 30px rgba(166, 124, 82, 0.6); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</h:head>
<h:body>
    <div class="splash-container">
        <i class="bi bi-cup-hot-fill logo-icon"></i>
        <div class="brand-title" style="font-family: 'Playfair Display', serif; text-transform: lowercase;">tierra</div><div style="font-size: 0.8rem; letter-spacing: 4px; color: #A67C52; margin-bottom: 10px;">A LA MESA</div>
        <div class="slogan">Kahvenin en saf hali...</div>
        <div>
            <div class="loader"></div>
        </div>
    </div>
</h:body>
</html>
