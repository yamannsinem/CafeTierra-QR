<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      data-bs-theme="dark">
<h:head>
    <title>tierra - Sipariş Alındı</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #121413;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: rgba(46,139,87,0.12);
            top: -200px; left: -200px;
            animation: drift1 20s infinite ease-in-out alternate;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: rgba(166,124,82,0.08);
            bottom: -150px; right: -150px;
            animation: drift2 25s infinite ease-in-out alternate;
        }
        @keyframes drift1 {
            from { transform: translate(0px, 0px); }
            to   { transform: translate(60px, 40px); }
        }
        @keyframes drift2 {
            from { transform: translate(0px, 0px); }
            to   { transform: translate(-40px, -60px); }
        }
        .success-card {
            position: relative;
            z-index: 10;
            background: rgba(26,31,28,0.97);
            border: 1px solid rgba(46,139,87,0.3);
            border-radius: 28px;
            padding: 3.5rem 3rem;
            text-align: center;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            animation: cardIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.85) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .check-wrap {
            width: 110px; height: 110px;
            margin: 0 auto 2rem;
            position: relative;
        }
        .check-circle {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2E8B57, #20B2AA);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(46,139,87,0.4);
            animation: popIn 0.5s 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .check-circle::after {
            content: '';
            position: absolute;
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(46,139,87,0.5);
            animation: pulse 2s 0.8s infinite ease-out;
        }
        @keyframes pulse {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        .check-icon {
            font-size: 2.8rem;
            color: #fff;
            font-weight: 300;
            animation: iconIn 0.4s 0.7s ease both;
        }
        @keyframes iconIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #EAE0D5;
            margin-bottom: 0.75rem;
            animation: fadeUp 0.5s 0.6s ease both;
        }
        .success-sub {
            font-size: 1rem;
            color: #A3A3A3;
            margin-bottom: 2rem;
            line-height: 1.6;
            animation: fadeUp 0.5s 0.75s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(46,139,87,0.12);
            border: 1px solid rgba(46,139,87,0.35);
            border-radius: 30px;
            padding: 10px 22px;
            color: #4ade80;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.5s 0.9s ease both;
        }
        .bar-wrap {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            height: 5px;
            overflow: hidden;
            margin-bottom: 0.75rem;
            animation: fadeUp 0.5s 1s ease both;
        }
        .bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #2E8B57, #20B2AA);
            border-radius: 10px;
            width: 100%;
            animation: shrink 3.5s 1.1s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
        .countdown-txt {
            font-size: 0.82rem;
            color: #888;
            animation: fadeUp 0.5s 1s ease both;
        }
        .brand-foot {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            animation: fadeUp 0.5s 1.1s ease both;
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #A67C52;
            font-weight: 700;
        }
        .brand-tag {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</h:head>
<h:body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="success-card">

        <div class="check-wrap">
            <div class="check-circle">
                <i class="bi bi-check-lg check-icon"></i>
            </div>
        </div>

        <h1 class="success-title">Ödeme Başarılı!</h1>
        <p class="success-sub">
            Siparişiniz mutfağa iletildi.<br/>
            Lütfen masanızda bekleyiniz.
        </p>

        <div class="info-badge">
            <i class="bi bi-bag-check-fill"></i>
            Sipariş Alındı
        </div>

        <div class="bar-wrap">
            <div class="bar-inner"></div>
        </div>
        <p class="countdown-txt" id="cdTxt">Menü sayfasına yönlendiriliyorsunuz...</p>

        <div class="brand-foot">
            <div class="brand-name">tierra</div>
            <div class="brand-tag">A LA MESA</div>
        </div>

    </div>

    <script>
        //<![CDATA[
        var secs = 3;
        var el = document.getElementById('cdTxt');
        var timer = setInterval(function() {
            secs--;
            if (secs <= 0) {
                clearInterval(timer);
                window.location.href = 'index.xhtml';
            } else {
                el.textContent = secs + ' saniye sonra menüye dönülüyor...';
            }
        }, 1000);
        //]]>
    </script>

</h:body>
</html>
