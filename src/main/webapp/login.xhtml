<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="jakarta.faces.passthrough">
<h:head>
    <title>tierra - #{languageBean.tr('Yönetici Girişi', 'Admin Login')}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="resources/css/login.css" />
</h:head>
<h:body>
    <div class="login-card position-relative">
        <!-- Float Language Toggle inside Card -->
        <div class="position-absolute top-0 end-0 m-3">
            <h:form id="langForm" style="display: inline;">
                <h:commandLink action="#{languageBean.toggleLanguage}" styleClass="btn btn-sm d-flex align-items-center" style="border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #EAE0D5; padding: 4px 10px; font-weight: 500; font-size: 0.8rem; text-decoration: none;">
                    <i class="bi bi-globe me-1" style="color: #A67C52;"></i>
                    #{languageBean.language == 'TR' ? 'EN' : 'TR'}
                </h:commandLink>
            </h:form>
        </div>

        <h3 class="text-center mb-4 pt-3" style="color: #EAE0D5; font-weight: 700; letter-spacing: 1px;">
            <i class="bi bi-shield-lock-fill me-2" style="color: #A67C52;"></i>
            #{languageBean.tr('Yönetici Girişi', 'Admin Login')}
        </h3>
        
        <h:messages globalOnly="true" styleClass="messages" errorClass="error" />

        <h:form id="loginForm">
            <div class="mb-3">
                <h:outputLabel value="#{languageBean.tr('Kullanıcı Adı', 'Username')}" styleClass="form-label"/>
                <h:inputText value="#{loginBean.username}" styleClass="form-control" required="true" requiredMessage="#{languageBean.tr('Kullanıcı adı gerekli', 'Username is required')}" />
            </div>
            <div class="mb-4">
                <h:outputLabel value="#{languageBean.tr('Şifre', 'Password')}" styleClass="form-label"/>
                <h:inputSecret value="#{loginBean.password}" styleClass="form-control" required="true" requiredMessage="#{languageBean.tr('Şifre gerekli', 'Password is required')}" />
            </div>
            <h:commandButton value="#{languageBean.tr('Giriş Yap', 'Login')}" action="#{loginBean.login}" styleClass="btn btn-accent w-100 py-2 mb-3" />
            <div class="text-center mt-2">
                <a href="index.xhtml" style="color: #D4C9B8; text-decoration: none; font-size: 0.95rem; transition: color 0.3s;">
                    &#8592; #{languageBean.tr('Ana Menüye Dön', 'Back to Main Menu')}
                </a>
            </div>
        </h:form>
    </div>
</h:body>
</html>
